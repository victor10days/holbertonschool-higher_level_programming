<!DOCTYPE html>
<html>
<head><title>Products</title></head>
<body>
    <h1>Product List</h1>
    {% if error %}
        <p>{{ error }}</p>
    {% else %}
        <table border="1">
            <tr><th>Name</th><th>Category</th><th>Price</th></tr>
            {% for product in products %}
                <tr><td>{{ product.name or product['name'] }}</td><td>{{ product.category or product['category'] }}</td><td>{{ product.price or product['price'] }}</td></tr>
            {% endfor %}
        </table>
    {% endif %}
</body>
</html>
